<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e131b"/><stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#46566a"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#1ed98a"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg2)"/>

  <text x="60" y="74" fill="#f4f7fb" font-size="38" font-weight="800" font-family="Georgia,serif">어떻게 동작하나</text>
  <text x="60" y="108" fill="#7d8da0" font-size="19">리눅스 한 대가 생성·보정·빌드·발행을 모두 처리하고, GitHub은 결과만 호스팅한다</text>

  <!-- ============ Linux box container ============ -->
  <rect x="48" y="150" width="760" height="500" rx="18" fill="#0c1119" stroke="#1c2632" stroke-width="1.5"/>
  <rect x="48" y="150" width="760" height="46" rx="18" fill="#121925"/>
  <rect x="48" y="178" width="760" height="18" fill="#121925"/>
  <circle cx="74" cy="173" r="5" fill="#1ed98a"/>
  <text x="92" y="179" fill="#9fb0c0" font-size="17" font-weight="700" letter-spacing="1">24시간 리눅스 박스 · cron 07:00 KST</text>

  <!-- run.sh label -->
  <text x="80" y="236" fill="#5a6a7c" font-size="15" font-weight="700" letter-spacing="2">run.sh</text>

  <!-- step boxes -->
  <g font-family="'Helvetica Neue',Arial">
    <!-- 1 generate -->
    <rect x="80" y="252" width="696" height="78" rx="12" fill="#141b26" stroke="#26303d"/>
    <circle cx="116" cy="291" r="17" fill="#1d2735"/><text x="116" y="297" fill="#c4d0dc" font-size="17" font-weight="800" text-anchor="middle">2</text>
    <text x="150" y="284" fill="#eef3f8" font-size="20" font-weight="700">생성 · 헤드리스 Claude Code (sonnet)</text>
    <text x="150" y="312" fill="#8595a6" font-size="16">웹검색으로 지수·종목·테마·매크로 수집 → data/data.json 작성</text>
    <rect x="648" y="270" width="112" height="40" rx="8" fill="#1a2230"/><text x="704" y="295" fill="#7d8da0" font-size="14" text-anchor="middle">서술·종목선정</text>

    <!-- 3 validate -->
    <rect x="80" y="344" width="696" height="58" rx="12" fill="#141b26" stroke="#26303d"/>
    <circle cx="116" cy="373" r="17" fill="#1d2735"/><text x="116" y="379" fill="#c4d0dc" font-size="17" font-weight="800" text-anchor="middle">3</text>
    <text x="150" y="368" fill="#eef3f8" font-size="20" font-weight="700">검증</text>
    <text x="150" y="391" fill="#8595a6" font-size="16">유효 JSON · 오늘 날짜 확인 — 실패 시 발행 건너뛰고 이전 리포트 유지</text>

    <!-- 4 patch -->
    <rect x="80" y="416" width="696" height="78" rx="12" fill="#141b26" stroke="#26303d"/>
    <circle cx="116" cy="455" r="17" fill="#13241c"/><text x="116" y="461" fill="#1ed98a" font-size="17" font-weight="800" text-anchor="middle">4</text>
    <text x="150" y="448" fill="#eef3f8" font-size="20" font-weight="700">정량보정 · Finnhub 시세 API</text>
    <text x="150" y="476" fill="#8595a6" font-size="16">등락률을 실제 종가로 덮어쓰기 · 부호 뒤집힘 교정 (정확화)</text>
    <rect x="648" y="434" width="112" height="40" rx="8" fill="#13241c"/><text x="704" y="459" fill="#1ed98a" font-size="14" text-anchor="middle">정확한 %</text>

    <!-- 5 build -->
    <rect x="80" y="508" width="696" height="58" rx="12" fill="#141b26" stroke="#26303d"/>
    <circle cx="116" cy="537" r="17" fill="#1d2735"/><text x="116" y="543" fill="#c4d0dc" font-size="17" font-weight="800" text-anchor="middle">5</text>
    <text x="150" y="532" fill="#eef3f8" font-size="20" font-weight="700">빌드</text>
    <text x="150" y="555" fill="#8595a6" font-size="16">data.json → 자체완결 HTML + SVG 트리맵 (순수 파이썬, 의존성 0)</text>

    <!-- 6 push -->
    <rect x="80" y="580" width="696" height="50" rx="12" fill="#11201a" stroke="#1ed98a" stroke-opacity="0.4"/>
    <circle cx="116" cy="605" r="17" fill="#13241c"/><text x="116" y="611" fill="#1ed98a" font-size="17" font-weight="800" text-anchor="middle">6</text>
    <text x="150" y="611" fill="#d6f5e7" font-size="20" font-weight="700">git push → GitHub Pages 자동 배포</text>
  </g>

  <!-- vertical connectors -->
  <g stroke="#46566a" stroke-width="2">
    <line x1="428" y1="330" x2="428" y2="344" marker-end="url(#arr)"/>
    <line x1="428" y1="402" x2="428" y2="416" marker-end="url(#arr)"/>
    <line x1="428" y1="494" x2="428" y2="508" marker-end="url(#arr)"/>
    <line x1="428" y1="566" x2="428" y2="580" marker-end="url(#arr)"/>
  </g>

  <!-- ============ GitHub + browser ============ -->
  <line x1="808" y1="605" x2="868" y2="605" stroke="#1ed98a" stroke-width="2.5" marker-end="url(#arrG)"/>

  <rect x="872" y="250" width="280" height="180" rx="16" fill="#0c1119" stroke="#1c2632"/>
  <text x="1012" y="298" fill="#eef3f8" font-size="22" font-weight="800" text-anchor="middle" font-family="Georgia,serif">GitHub Pages</text>
  <text x="1012" y="326" fill="#7d8da0" font-size="15" text-anchor="middle">docs/ 폴더 정적 호스팅</text>
  <rect x="904" y="346" width="216" height="30" rx="6" fill="#141b26"/><text x="1012" y="366" fill="#8595a6" font-size="14" text-anchor="middle">index.html · archive/</text>
  <text x="1012" y="406" fill="#5a6a7c" font-size="14" text-anchor="middle">빌드/서버 코드 없음 — 정적 배포만</text>

  <rect x="872" y="470" width="280" height="160" rx="16" fill="#0c1119" stroke="#1c2632"/>
  <text x="1012" y="516" fill="#eef3f8" font-size="22" font-weight="800" text-anchor="middle" font-family="Georgia,serif">어느 PC에서나</text>
  <text x="1012" y="548" fill="#7d8da0" font-size="15" text-anchor="middle">브라우저로 접속</text>
  <rect x="896" y="568" width="232" height="38" rx="8" fill="#13241c" stroke="#1ed98a" stroke-opacity="0.35"/>
  <text x="1012" y="592" fill="#1ed98a" font-size="13.5" text-anchor="middle" font-family="monospace">…github.io/market-compass</text>

  <line x1="1012" y1="430" x2="1012" y2="470" stroke="#1ed98a" stroke-width="2.5" marker-end="url(#arrG)"/>
</svg>
